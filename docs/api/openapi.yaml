openapi: 3.1.0
info:
  title: Index One API
  version: 1.0.0
  description: Public gateway contract for the global news aggregation platform.
servers:
  - url: https://api.aperture-news.example.com
paths:
  /news:
    get:
      summary: List ranked articles
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: cursor
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
      responses:
        "200":
          description: Paginated news feed
  /news/{id}:
    get:
      summary: Get a specific article
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Article payload
        "404":
          description: Article not found
  /search:
    get:
      summary: Search indexed articles
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
  /categories:
    get:
      summary: List available categories and counts
      responses:
        "200":
          description: Category summaries
  /trending:
    get:
      summary: List top-ranked articles
      responses:
        "200":
          description: Trending results
  /bookmark:
    post:
      summary: Bookmark an article for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - articleId
              properties:
                userId:
                  type: string
                  format: uuid
                articleId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Bookmark accepted
