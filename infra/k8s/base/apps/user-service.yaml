apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: news-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ghcr.io/example/news/user-service:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: news-platform-config
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: news-platform
spec:
  selector:
    app: user-service
  ports:
    - port: 3000
      targetPort: 3000

