apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: news-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/example/news/api-gateway:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: news-platform-config
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: news-platform
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 3001
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: news-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

