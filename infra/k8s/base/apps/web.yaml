apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: news-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/example/news/web:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: news-platform-config
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: news-platform
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 3000

